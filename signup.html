<!DOCTYPE html>
<html>

<head>
    <title>DoBu Martial Arts</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="header">
    <div class = "left-header">
        <a href="index.html">
            <img src="img/dobu-logo.png" class="logo" alt="logo">
        </a>
    </div>

    <nav class="navbar">
        <a href="ourservices.html">Our Services</a>
        <a href="ourteam.html">Our Team</a>
        <a href="memberships.html">Memberships</a>
        <a href="contactus.html">Contact Us</a>
    </nav>
    
    <div class="right">
        <a href="login.html" class="login">Login</a>
    </div>

</header>

<div class="signup-container">
    <div class="signup-header">
        <h2>Create Account</h2>
    </div>    
    <form action="#" method="post">
        <div class="form-group">
            <label for="name">Full Name:</label>
            <input type="text" id="name" name="name" autocomplete="name" required>
        </div>
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" autocomplete="username" required>
        </div>
        <div class="form-group">
            <label for="password">Password:</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div class="form-options">
            <div class="tos">
                <input type="checkbox" id="tos" name="tos" required>
                <label for="tos">I agree to the <a href="#" target="_blank">Terms of Service</a> and <a href="#" target="_blank">Privacy Policy</a></label>
            </div>
        </div>
        <button type="submit" class="signup-button">Sign Up</button>
    </form>
</div>
<div class="login-prompt">
    <p>Already have an account? <a href="login.html">Log In Here!</a></p>
</body>

</html>

<!DOCTYPE html>
<html>

<head>
    <title>DoBu Martial Arts</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="left-header">
            <a href="index.html">
                <img src="img/dobu-logo.png" class="logo" alt="logo">
            </a>
        </div>

        <nav class="navbar" id="navMenu">
            <a href="ourservices.html">Our Services</a>
            <a href="ourteam.html">Our Team</a>
            <a href="memberships.html">Memberships</a>
            <a href="timetable.html">Timetable</a>
            <a href="contactus.html">Contact Us</a>
        </nav>
        
        <div class="right">
            <a href="login.html" class="login">Login</a>
            <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        </div>
    </header>


    <!-- BLACK HERO STRIP -->
    <section class="contact-hero-strip">
        <h1>Contact Us</h1>
    </section>


    <!-- FORM + SUPPORT MESSAGE -->
    <section class="contact-row">

        <!-- LEFT FORM -->
        <div class="contact-form-box">
            <form id="contactForm">

                <label>First Name:</label>
                <input id="firstName" type="text" placeholder="Enter your first name">

                <label>Surname:</label>
                <input id="surname" type="text" placeholder="Enter your surname">

                <label>Email Address:</label>
                <input id="email" type="email" placeholder="Enter your email">

                <label>Enquiry Description:</label>
                <textarea id="enquiry" placeholder="Describe your enquiry"></textarea>

                <p id="errorMessage" class="error-text"></p>

                <button type="submit">Submit</button>

            </form>
        </div>

        <!-- RIGHT SUPPORT BOX -->
        <div class="contact-support-box">
            <p>
                If you experience any problems call us at:
                <a href="tel:01226123456" class="contact-phone">01226 123456</a>
            </p>
        </div>

    </section>


    <!-- FOOTER -->
    <footer class="footer">
        <div class="footer-content">
            <div class="footer-section">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="ourservices.html">Our Services</a></li>
                    <li><a href="ourteam.html">Our Team</a></li>
                    <li><a href="memberships.html">Memberships</a></li>
                    <li><a href="timetable.html">Timetable</a></li>
                    <li><a href="contactus.html">Contact Us</a></li>
                </ul>
            </div>

            <div class="footer-right">
                <div class="footer-section">
                    <h3>Follow Our Socials!</h3>
                    <div class="social-icons">
                        <a href="#"><img src="img/white-facebook.png" alt="Facebook"></a>
                        <a href="#"><img src="img/twitter-32.png" alt="Twitter"></a>
                        <a href="#"><img src="img/white-instagram.webp" alt="Instagram"></a>
                    </div>
                </div>
            </div>

            <div class="footer-bottom">
                <p>©2026 DoBu Martial Arts. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>

</body>
</html>
